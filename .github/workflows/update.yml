name: Update Polymarket Data

on:
  schedule:
    # Every 30 minutes — fetch latest prices
    - cron: '*/30 * * * *'
    # Every Monday 00:00 UTC — re-discover new markets
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      run_discovery:
        description: 'Also run auto-discovery?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Auto-discovery (weekly or manual) ──────────────────────────────────
      - name: Run auto-discovery
        if: |
          github.event.schedule == '0 0 * * 1' ||
          github.event.inputs.run_discovery == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running auto_discover.py..."
          python auto_discover.py
          echo "Discovery complete."

      # ── Price fetch (every 30 min) ─────────────────────────────────────────
      - name: Fetch latest prices
        run: python fetch_data.py

      # ── Commit ─────────────────────────────────────────────────────────────
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: auto-update [skip ci]"
          file_pattern: "docs/data.json"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Commit markets_config if exists
        run: |
          if [ -f markets_config.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add markets_config.json
            git diff --cached --quiet || git commit -m "data: update markets_config [skip ci]"
            git push
          fi
