name: Update Polymarket Data

on:
  schedule:
    # Every 30 minutes — fetch latest prices
    - cron: '*/30 * * * *'
    # Every Monday 00:00 UTC — re-discover + backfill new markets
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      run_discovery:
        description: 'Run auto-discovery + backfill?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force_rebackfill:
        description: 'Force re-backfill ALL markets (fixes historical spikes)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      clean_history:
        description: 'Clean corrupted history (99%↔2% swings) then re-backfill?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Auto-discovery (weekly or manual) ──────────────────────────────────
      - name: Run auto-discovery
        if: |
          github.event.schedule == '0 0 * * 1' ||
          github.event.inputs.run_discovery == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== auto_discover.py ==="
          python auto_discover.py

      # ── Backfill new markets (after discovery, or manually) ────────────────
      - name: Backfill history for new markets
        if: |
          github.event.schedule == '0 0 * * 1' ||
          github.event.inputs.run_discovery == 'true'
        run: |
          echo "=== backfill_history.py (new markets only) ==="
          python backfill_history.py --days 365 --min-pts 100

      # ── Clean corrupted history then re-backfill ──────────────────────────
      - name: Clean corrupted history + re-backfill
        if: github.event.inputs.clean_history == 'true'
        run: |
          echo "=== clean_history.py --apply ==="
          python clean_history.py --apply
          echo "=== backfill_history.py --force ==="
          python backfill_history.py --days 365 --force

      # ── Force re-backfill ALL markets (clears spike artifacts) ─────────────
      - name: Force re-backfill all markets (daily fidelity)
        if: github.event.inputs.force_rebackfill == 'true'
        run: |
          echo "=== backfill_history.py --force (daily fidelity, removes spikes) ==="
          python backfill_history.py --days 365 --force

      # ── Price fetch (every 30 min) ─────────────────────────────────────────
      - name: Fetch latest prices
        run: python fetch_data.py

      # ── Commit data.json ───────────────────────────────────────────────────
      - name: Commit data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: auto-update [skip ci]"
          file_pattern: "docs/data.json"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      # ── Commit markets_config.json if it was updated ───────────────────────
      - name: Commit markets_config if updated
        run: |
          if [ -f markets_config.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add markets_config.json
            git diff --cached --quiet || git commit -m "data: update markets_config [skip ci]" && git push || true
          fi
